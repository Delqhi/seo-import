<!doctype html>
<html lang="{{site.language}}">
<head>
<meta charset="utf-8" />
<title>{{site.name}} — {{site.description}}</title>
<base href="/" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="description" content="{{site.description}}" />
<meta name="author" content="{{person.name}}" />
<meta name="keywords" content="{{organization.knowsAbout.join(', ')}}" />
<meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
<meta name="googlebot" content="index, follow" />
<meta name="theme-color" content="{{site.themeColor}}" />
<link rel="icon" type="image/x-icon" href="favicon.ico" />
<link rel="canonical" href="{{site.url}}/" />
<link rel="alternate" type="application/rss+xml" title="{{site.name}} RSS" href="/rss.xml" />
{{#if site.alternateLanguages}}
{{#each site.alternateLanguages}}
<link rel="alternate" hreflang="{{this}}" href="{{../site.url}}/{{this}}/" />
{{/each}}
{{/if}}

<!-- Open Graph -->
<meta property="og:title" content="{{site.name}} — {{site.description}}" />
<meta property="og:description" content="{{site.description}}" />
<meta property="og:type" content="website" />
<meta property="og:url" content="{{site.url}}/" />
<meta property="og:site_name" content="{{organization.name}}" />
<meta property="og:locale" content="{{site.language}}_{{site.language | uppercase}}" />
{{#if site.alternateLanguages}}
<meta property="og:locale:alternate" content="{{site.alternateLanguages.[0]}}_{{site.alternateLanguages.[0] | uppercase}}" />
{{/if}}
<meta property="og:image" content="{{organization.logo}}" />
{{#if organization.logoWidth}}
<meta property="og:image:width" content="{{organization.logoWidth}}" />
<meta property="og:image:height" content="{{organization.logoHeight}}" />
{{/if}}
<meta property="og:image:alt" content="{{organization.name}} Logo" />

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="{{site.name}} — {{site.description}}" />
<meta name="twitter:description" content="{{site.description}}" />
<meta name="twitter:image" content="{{organization.logo}}" />
{{#if social.twitter}}
<meta name="twitter:site" content="{{social.twitter}}" />
<meta name="twitter:creator" content="{{social.twitter}}" />
{{/if}}

<!-- JSON-LD: Organization -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "{{organization.name}}",
  {{#if organization.alternateName}}"alternateName": "{{organization.alternateName}}",{{/if}}
  "url": "{{organization.url}}",
  "logo": "{{organization.logo}}",
  "description": "{{site.description}}",
  "sameAs": {{json organization.sameAs}},
  "knowsAbout": {{json organization.knowsAbout}}
}
</script>

<!-- JSON-LD: Person -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "name": "{{person.name}}",
  {{#if person.alternateName}}"alternateName": "{{person.alternateName}}",{{/if}}
  "url": "{{site.url}}",
  "jobTitle": "{{person.jobTitle}}",
  "worksFor": {
    "@type": "Organization",
    "name": "{{organization.name}}"
  },
  "sameAs": {{json person.sameAs}},
  "knowsAbout": {{json person.knowsAbout}}
}
</script>

<!-- JSON-LD: WebSite -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "{{site.name}}",
  "url": "{{site.url}}",
  "description": "{{site.description}}",
  "publisher": {
    "@type": "Organization",
    "name": "{{organization.name}}",
    "logo": {
      "@type": "ImageObject",
      "url": "{{organization.logo}}"
    }
  },
  "potentialAction": {
    "@type": "SearchAction",
    "target": "{{site.url}}/blog?q={search_term_string}",
    "query-input": "required name=search_term_string"
  }
}
</script>

<!-- JSON-LD: FAQPage -->
{{#if faq}}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": {{json faq}}
}
</script>
{{/if}}

<!-- JSON-LD: BreadcrumbList -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {{#each pages}}
    {
      "@type": "ListItem",
      "position": {{add @index 1}},
      "name": "{{this.name}}",
      "item": "{{../site.url}}{{this.path}}"
    }{{#unless @last}},{{/unless}}
    {{/each}}
  ]
}
</script>

</head>
<body>
  <app-root></app-root>
</body>
</html>
